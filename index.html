<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator | Ganesh Padhy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-calculator"></i> Calculator</h1>
    
    <div class="calculator">
      <div class="display">
        <div class="previous-operand" id="previousOperand"></div>
        <div class="current-operand" id="currentOperand">0</div>
      </div>
      
      <div class="buttons">
        <button class="span-two clear" onclick="clearAll()">AC</button>
        <button class="delete" onclick="deleteLast()">DEL</button>
        <button class="operator" onclick="appendOperator('÷')">÷</button>
        
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('×')">×</button>
        
        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('-')">-</button>
        
        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button class="operator" onclick="appendOperator('+')">+</button>
        
        <button onclick="appendNumber('0')">0</button>
        <button onclick="appendNumber('.')">.</button>
        <button class="span-two equals" onclick="calculate()">=</button>
      </div>
    </div>

    <div class="history">
      <h3><i class="fas fa-history"></i> History</h3>
      <div id="historyList"></div>
      <button class="clear-history" onclick="clearHistory()">Clear History</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
